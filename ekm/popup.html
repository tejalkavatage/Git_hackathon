<!DOCTYPE html>
<html>
<head>
  <title>AI Accessibility & Productivity</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      font-size: 14px;
      cursor: pointer;
    }
    #summary {
      margin-top: 10px;
      white-space: pre-wrap;
      background: #f0f0f0;
      padding: 8px;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h3>AI Accessibility & Productivity</h3>

  <button id="voice-fill-btn">Start Voice Form Filling</button>

  <h4>Video Controls</h4>
  <button data-video-command="play" class="video-btn">Play Video</button>
  <button data-video-command="pause" class="video-btn">Pause Video</button>
  <button data-video-command="rewind" class="video-btn">Rewind 10s</button>
  <button data-video-command="forward" class="video-btn">Forward 10s</button>

  <h4>Website Summarization</h4>
  <button id="summarize-btn">Summarize Page</button>
  <div id="summary"></div>

  <h4>Colorblind Assistance</h4>
  <button data-color-type="protanopia" class="color-btn">Protanopia Filter</button>
  <button data-color-type="deuteranopia" class="color-btn">Deuteranopia Filter</button>
  <button data-color-type="tritanopia" class="color-btn">Tritanopia Filter</button>
  <button id="remove-color-filter">Remove Filter</button>

  <h4>Text-to-Speech</h4>
  <button id="read-aloud-btn">Read Page Aloud</button>

  <script src="popup.js"></script>
</body>
</html>
