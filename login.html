<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login / Sign Up with Bot and Lottie Animation</title>
<script
  src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"
  type="module"
  defer
  >
</script>
<script defer type="module" src="firebase.js"></script>
<style>
  * {
    box-sizing: border-box;
  }
  body, html {
    margin: 0; padding: 0;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f7fa;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    width: 900px;
    max-width: 95vw;
    height: 550px;
    background: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-radius: 12px;
    display: flex;
    overflow: hidden;
    position: relative;
  }
  /* Left form side */
  .form-container {
    flex: 1;
    padding: 40px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    transition: transform 0.7s ease;
    z-index: 2;
  }
  /* Right animation side */
  .animation-container {
    flex: 1;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
    transition: transform 0.7s ease;
  }
  dotlottie-player {
    width: 100%;
    max-width: 350px;
    height: 350px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }
  /* Forms common */
  form {
    display: flex;
    flex-direction: column;
  }
  form h2 {
    margin-bottom: 24px;
    font-weight: 700;
    font-size: 28px;
    color: #222;
  }
  label {
    font-weight: 600;
    margin-bottom: 8px;
    margin-top: 16px;
    color: #444;
  }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    padding: 10px 14px;
    font-size: 16px;
    border: 1.8px solid #ccc;
    border-radius: 8px;
    outline-offset: 2px;
    transition: border-color 0.3s;
  }
  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="password"]:focus {
    border-color: #007bff;
  }
  button {
    margin-top: 24px;
    padding: 12px 0;
    background: #007bff;
    color: white;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  button:hover {
    background: #0056b3;
  }
  .google-btn {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    border: 2px solid #4285F4;
    color: #4285F4;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    padding: 10px 0;
    user-select: none;
  }
  .google-btn:hover {
    background: #4285F4;
    color: white;
  }
  .google-btn img {
    width: 22px;
    height: 22px;
    margin-right: 10px;
  }

  /* Toggle buttons */
  .toggle-text {
    margin-top: 24px;
    font-size: 14px;
    color: #666;
    cursor: pointer;
    user-select: none;
  }
  .toggle-text span {
    font-weight: 700;
    color: #007bff;
  }

  /* Sliding animation for forms */
  .container.sign-up-mode .form-container {
    transform: translateX(-100%);
  }
  .container.sign-up-mode .animation-container {
    transform: translateX(100%);
  }

  /* Responsive */
  @media (max-width: 720px) {
    .container {
      flex-direction: column;
      height: auto;
      width: 95vw;
    }
    .form-container,
    .animation-container {
      flex: none;
      width: 100%;
      transform: translateX(0) !important;
      padding: 30px 20px;
    }
    dotlottie-player {
      max-width: 280px;
      height: 280px;
    }
  }

  /* Chatbot styles */
  #chatbot-wrapper {
    position: fixed;
    bottom: 20px;
    right: 40px;
    width: 320px;
    max-width: 90vw;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    border-radius: 14px;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: white;
    display: none;
    flex-direction: column;
    height: 420px;
    z-index: 9999;
  }
  #chatbot-header {
    background: #007bff;
    color: white;
    padding: 12px 16px;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #chatbot-messages {
    flex: 1;
    padding: 12px 16px;
    overflow-y: auto;
    background: #f0f4ff;
  }
  .chat-message {
    margin-bottom: 10px;
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    clear: both;
  }
  .chat-user {
    background: #007bff;
    color: white;
    float: right;
  }
  .chat-bot {
    background: #ddd;
    color: #222;
    float: left;
  }
  #chatbot-input-area {
    padding: 10px 14px;
    border-top: 1px solid #ccc;
    display: flex;
  }
  #chatbot-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 14px;
    border: 1.5px solid #ccc;
    outline-offset: 2px;
    font-size: 16px;
  }
  #chatbot-send-btn {
    margin-left: 10px;
    background: #007bff;
    border: none;
    color: white;
    font-weight: 700;
    padding: 0 16px;
    border-radius: 14px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  #chatbot-send-btn:hover {
    background: #0056b3;
  }
  #chatbot-close-btn {
    font-weight: 900;
    cursor: pointer;
    font-size: 20px;
  }

  /* Show bot button inside signup form */
  #bot-toggle-btn {
    margin-top: 18px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s;
    width: 100%;
  }
  #bot-toggle-btn:hover {
    background: #1e7e34;
  }
</style>
</head>
<body>

<div class="container" id="container">
  <div class="form-container" id="form-container">
    <!-- Login Form -->
    <form id="login-form">
      <h2>Login</h2>
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="Enter your email" required />
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" required />
      <button type="submit">Login</button>
      <div class="google-btn" id="google-login">
        <img src="Google__G__logo.svg" alt="Google logo" />
        Sign in with Google
      </div>
      <p class="toggle-text">Don't have an account? <span id="show-signup">Sign Up</span></p>
    </form>

    <!-- Sign Up Form -->
    <form id="signup-form" style="display:none;">
      <h2>Sign Up</h2>
      <label for="signup-name">Name</label>
      <input type="text" id="signup-name" placeholder="Enter your full name" required />
      <label for="signup-email">Email</label>
      <input type="email" id="signup-email" placeholder="Enter your email" required />
      <label for="signup-password">Password</label>
      <input type="password" id="signup-password" placeholder="Enter password" required />
      <label for="signup-confirm-password">Confirm Password</label>
      <input type="password" id="signup-confirm-password" placeholder="Confirm password" required />
      <button type="submit">Sign Up</button>
      <div class="google-btn" id="google-signup">
        <img src="Google__G__logo.svg" alt="Google logo" />
        Sign up with Google
      </div>
      <p class="toggle-text">Already have an account? <span id="show-login">Login</span></p>

      <!-- Bot toggle button inside signup -->
      <button type="button" id="bot-toggle-btn">Chat with Bot 🤖</button>
    </form>
  </div>

  <!-- Animation Section -->
  <div class="animation-container">
    <dotlottie-player
      src="https://assets1.lottiefiles.com/packages/lf20_fcfjwiyb.json"
      background="transparent"
      speed="1"
      loop
      autoplay
    ></dotlottie-player>
  </div>
</div>

<!-- Chatbot widget -->
<div id="chatbot-wrapper" aria-label="Chatbot widget" role="region">
  <div id="chatbot-header">
    Chat Bot
    <span id="chatbot-close-btn" aria-label="Close chatbot">&times;</span>
  </div>
  <div id="chatbot-messages" aria-live="polite" aria-relevant="additions"></div>
  <div id="chatbot-input-area">
    <input type="text" id="chatbot-input" placeholder="Type your message..." aria-label="Chat input" />
    <button id="chatbot-send-btn" aria-label="Send message">Send</button>
  </div>
</div>

<script>
  const container = document.getElementById('container');
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const showSignup = document.getElementById('show-signup');
  const showLogin = document.getElementById('show-login');

  showSignup.addEventListener('click', () => {
    loginForm.style.display = 'none';
    signupForm.style.display = 'flex';
  });
  showLogin.addEventListener('click', () => {
    signupForm.style.display = 'none';
    loginForm.style.display = 'flex';
    closeChatbot(); // close bot if open
  });

  // Chatbot elements
  const botToggleBtn = document.getElementById('bot-toggle-btn');
  const chatbotWrapper = document.getElementById('chatbot-wrapper');
  const chatbotCloseBtn = document.getElementById('chatbot-close-btn');
  const chatbotMessages = document.getElementById('chatbot-messages');
  const chatbotInput = document.getElementById('chatbot-input');
  const chatbotSendBtn = document.getElementById('chatbot-send-btn');

  // Show/hide chatbot
  botToggleBtn.addEventListener('click', () => {
    if(chatbotWrapper.style.display === 'flex'){
      closeChatbot();
    } else {
      openChatbot();
    }
  });
  chatbotCloseBtn.addEventListener('click', closeChatbot);

  function openChatbot(){
    chatbotWrapper.style.display = 'flex';
    chatbotInput.focus();
    appendBotMessage("Hello! I'm here to help you with signing up. Feel free to ask me anything.");
  }
  function closeChatbot(){
    chatbotWrapper.style.display = 'none';
    chatbotMessages.innerHTML = '';
  }

  // Append messages to chat window
  function appendUserMessage(text){
    const div = document.createElement('div');
    div.className = 'chat-message chat-user';
    div.textContent = text;
    chatbotMessages.appendChild(div);
    chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
  }
  function appendBotMessage(text){
    const div = document.createElement('div');
    div.className = 'chat-message chat-bot';
    div.textContent = text;
    chatbotMessages.appendChild(div);
    chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
  }

  // Basic dummy bot response
  function botReply(message){
    // Simple canned responses
    const msg = message.toLowerCase();

    if(msg.includes('password')){
      return "Make sure your password is strong with at least 8 characters, including letters and numbers.";
    } else if(msg.includes('email')){
      return "Please enter a valid email address, like example@example.com.";
    } else if(msg.includes('name')){
      return "Please provide your full name as you'd like it to appear on your account.";
    } else if(msg.includes('help')){
      return "I'm here to help! Ask me anything about the sign-up process.";
    } else if(msg.trim() === ''){
      return "Please type something!";
    } else {
      return "Sorry, I didn't quite get that. Can you rephrase or ask about sign-up?";
    }
  }

  // Send message from input
  function sendMessage(){
    const text = chatbotInput.value.trim();
    if(!text) return;
    appendUserMessage(text);
    chatbotInput.value = '';
    setTimeout(() => {
      appendBotMessage(botReply(text));
    }, 600);
  }

  chatbotSendBtn.addEventListener('click', sendMessage);
  chatbotInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') {
      e.preventDefault();
      sendMessage();
    }
  });
  
</script>

</body>
</html>
